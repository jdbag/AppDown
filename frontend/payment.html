<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الدفع عبر Stripe</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
  <!-- الهيدر -->
  <header>
    <div class="logo">AppDown</div>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="payment.html">الدفع</a>
      <a href="signin.html">تسجيل الدخول</a>
      <a href="privacy.html">الخصوصية</a>
      <a href="terms.html">الشروط</a>
    </nav>
  </header>

  <!-- القسم الرئيسي -->
  <section class="hero">
    <h1>بوابة دفع عالمية</h1>
    <p>قم بالدفع بسهولة وأمان باستخدام Stripe</p>
    <button id="checkoutBtn">ادفع الآن</button>
  </section>

  <!-- الفوتر -->
  <footer>
    <p>© 2025 AppDown - جميع الحقوق محفوظة | 
       <a href="privacy.html">الخصوصية</a> | 
       <a href="terms.html">الشروط</a>
    </p>
  </footer>

  <script>
    const stripe = Stripe("ضع_هنا_المفتاح_العام_من_Stripe"); // المفتاح العام من حسابك في Stripe

    document.getElementById("checkoutBtn").addEventListener("click", async () => {
      try {
        // استدعاء الـ backend لإنشاء جلسة دفع
        const response = await fetch("http://192.168.1.7:3000/checkout", {
          method: "POST",
          headers: { "Content-Type": "application/json" }
        });
        const data = await response.json();

        // إعادة التوجيه إلى صفحة الدفع
        const result = await stripe.redirectToCheckout({ sessionId: data.id });
        if (result.error) {
          alert(result.error.message);
        }
      } catch (err) {
        console.error("خطأ في الدفع:", err);
      }
    });
  </script>
</body>
</html>
