<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>الدفع عبر Pi Network</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <header>
    <h1>الدفع عبر Pi Network</h1>
  </header>
  <main style="text-align:center;">
    <button id="payBtn">ادفع الآن</button>
  </main>

  <script>
    Pi.init({ version: "2.0" });

    document.getElementById("payBtn").addEventListener("click", async () => {
      try {
        const payment = await Pi.createPayment({
          amount: 1,
          memo: "شراء من AppDown",
          metadata: { productId: "appdown001" }
        });
        console.log("تم إنشاء الدفع:", payment);
      } catch (err) {
        console.error("خطأ في الدفع:", err);
      }
    });
  </script>
</body>
</html>
