<!DOCTYPE html>
<html>
<head>
  <title>AppDown Sign in</title>
  <!-- تحميل Pi SDK -->
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <script>
    function signInWithPi() {
      window.Pi.openLogin({
        onReady: function() {
          console.log("Pi SDK ready");
        },
        onLogin: function(authData) {
          console.log("User logged in:", authData);
          alert("Logged in as: " + authData.user.uid);
        },
        onIncompletePaymentFound: function(payment) {
          console.log("Incomplete payment found:", payment);
        }
      });
    }
  </script>
</head>
<body>
  <button onclick="signInWithPi()">Sign in with Pi Network</button>
</body>
</html>
