<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pi Payment Test</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <button id="payBtn">ادفع باستخدام Pi</button>

  <script>
    // ضع الـ App ID الصحيح من Pi Developer Portal
    Pi.init({ version: "2.0", appId: "YOUR_APP_ID" });

    document.getElementById("payBtn").addEventListener("click", async () => {
      try {
        // المصادقة مع صلاحية الدفع
        const authResult = await Pi.authenticate({ scopes: ["username", "payments"] });

        // إنشاء الدفع
        const payment = await Pi.createPayment({
          amount: 1,
          memo: "Test payment",
          metadata: { orderId: "1234" }
        });

        // نافذة منبثقة تعرض الـ Payment ID
        alert("📌 Payment ID: " + payment.identifier);

        // إرسال الـ Payment ID للـ Backend
        await fetch("/api/approve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ paymentId: payment.identifier })
        });
      } catch (err) {
        alert("❌ Error: " + err.message);
        console.error("❌ Error creating payment:", err);
      }
    });
  </script>
</body>
</html>
